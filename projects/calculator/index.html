<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div class="calculator">
      <div id="display">0</div>
      <div class="buttons">
        <button type="button" class="clear">C</button>
        <button type="button" class="parenthesis btns">(</button>
        <button type="button" class="parenthesis btns">)</button>
        <button type="button" class="operator btns" id="add">+</button>
        <button type="button" class="operator btns" id="sub">-</button>
        <button type="button" class="operator btns" id="mul">*</button>
        <button type="button" class="operator btns" id="div">/</button>
        <button type="button" class="equals">=</button>
        <button type="button" class="delete">⌫</button>
        <button type="button" class="number btns" id="b1">1</button>
        <button type="button" class="number btns" id="b2">2</button>
        <button type="button" class="number btns" id="b3">3</button>
        <button type="button" class="number btns" id="b4">4</button>
        <button type="button" class="number btns" id="b5">5</button>
        <button type="button" class="number btns" id="b6">6</button>
        <button type="button" class="number btns" id="b7">7</button>
        <button type="button" class="number btns" id="b8">8</button>
        <button type="button" class="number btns" id="b9">9</button>
        <button type="button" class="number btns" id="b0">0</button>
        <button type="button" class="dot btns">.</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
